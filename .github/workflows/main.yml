name: Run LOL-SUPPORT-BOT

on:
  schedule:
    # 1회차: 한국 00:00 시작 (UTC 15:00)
    - cron: '0 15 * * *'
    # 2회차: 한국 08:00 시작 (UTC 23:00)
    - cron: '0 23 * * *'
    # 3회차: 한국 12:00 시작 (UTC 03:00)
    - cron: '0 3 * * *'
    # 4회차: 한국 20:00 시작 (UTC 11:00)
    - cron: '0 11 * * *'

  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py aiohttp beautifulsoup4 lxml

      - name: Run LOL-SUPPORT-BOT
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: python bot.py
