name: Run LoL Bot

on:
  schedule:
    - cron: '0 */5 * * *'  # 5시간마다 자동 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 라이브러리 설치는 이 한 줄이면 충분합니다.
        run: pip install discord.py aiohttp beautifulsoup4

      - name: Run Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          # 만약 채널 ID도 시크릿에 넣었다면 아래줄 추가 (코드에서 os.getenv로 부를 경우)
          # NEWS_CHANNEL_ID: ${{ secrets.NEWS_CHANNEL_ID }} 
        run: python bot.py
